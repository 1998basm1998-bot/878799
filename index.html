<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>صالون مواعيد</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <img src="https://d.top4top.io/s_38306ydrl1.jpg" alt="شعار صالون مواعيد" class="logo" />
      <h1>صالون مواعيد</h1>
      <p>لحجز المواعيد وشراء المنتجات</p>
    </header>

    <main class="main-content">
      <div class="banner-container">
        <div class="banner-slider" id="banner-slider">
          <img
            src="https://a.top4top.io/p_3830415tg1.jpg"
            alt="عرض 1"
            class="slide active"
          />
          <img
            src="https://a.top4top.io/p_3830415tg1.jpg"
            alt="عرض 2"
            class="slide next"
          />
          <img
            src="https://a.top4top.io/p_3830415tg1.jpg"
            alt="عرض 3"
            class="slide next"
          />
        </div>
      </div>
      <section id="home-section" class="page-section active">
        <h2 class="section-title">أحدث أعمالنا</h2>
        <div class="gallery">
          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1562322140-8baeececf3df?auto=format&fit=crop&q=80&w=400&h=400"
              alt="تسريحة شعر"
            />
            <div class="item-details">
              <h3>تسريحة شعر سهرة</h3>
              <span class="price">50,000 د.ع</span>
            </div>
          </div>
          <div class="gallery-item">
            <img
              src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?auto=format&fit=crop&q=80&w=400&h=400"
              alt="مكياج"
            />
            <div class="item-details">
              <h3>مكياج احترافي</h3>
              <span class="price">75,000 د.ع</span>
            </div>
          </div>
        </div>

        <h2 class="section-title">المنتجات المميزة</h2>
        <div class="products">
          <div class="product-card">
            <img
              src="https://images.unsplash.com/photo-1599305090598-fe179d501227?auto=format&fit=crop&q=80&w=200&h=200"
              alt="سيروم"
            />
            <h4>سيروم للشعر</h4>
            <span class="price">25,000 د.ع</span>
            <button class="action-btn">إضافة للسلة</button>
          </div>
          <div class="product-card">
            <img
              src="https://images.unsplash.com/photo-1620916566398-39f1143ab7be?auto=format&fit=crop&q=80&w=200&h=200"
              alt="كريم"
            />
            <h4>كريم ترطيب</h4>
            <span class="price">15,000 د.ع</span>
            <button class="action-btn">إضافة للسلة</button>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="#" class="nav-item">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
          ></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        <span>المنتجات</span>
      </a>
      <a href="#" class="nav-item active">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>الرئيسية</span>
      </a>
      <a href="#" class="nav-item">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>الحجوزات</span>
      </a>
    </nav>
    <div id="toast" class="toast">قريباً...</div>
    <script src="./script.js"></script>
  </body>
</html>
